<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FadeTrent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: #e8e8e8;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .glow {
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,80,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto; padding: 48px 24px;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      background: rgba(0,255,80,0.08); border: 1px solid rgba(0,255,80,0.2);
      border-radius: 4px; padding: 4px 12px;
      font-size: 11px; letter-spacing: 3px; color: #00ff50;
      margin-bottom: 20px; text-transform: uppercase;
    }
    h1 { font-size: clamp(36px, 7vw, 56px); font-weight: 900; letter-spacing: -2px; line-height: 1; color: #fff; margin-bottom: 8px; }
    h1 span { color: #00ff50; }
    .subtitle { color: #555; font-size: 14px; letter-spacing: 1px; }

    /* Input card */
    .card {
      background: #111; border: 1px solid #222;
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card.url-detected { border-color: rgba(0,255,80,0.3); }
    .card-label { font-size: 11px; letter-spacing: 2px; color: #555; display: block; margin-bottom: 10px; }
    .card-label.green { color: #00ff50; }

    input[type="text"] {
      width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 14px; color: #e8e8e8;
      font-size: 14px; font-family: inherit; outline: none;
      transition: all 0.2s;
    }
    input[type="text"].url { color: #00ff50; border-color: rgba(0,255,80,0.3); }
    input[type="text"]:focus { border-color: rgba(0,255,80,0.4); }

    .tweet-preview {
      margin-top: 12px; padding: 12px 14px;
      background: rgba(0,255,80,0.04); border: 1px solid rgba(0,255,80,0.15);
      border-radius: 6px; font-size: 13px; color: #aaa; line-height: 1.5;
    }
    .tweet-preview-label { font-size: 10px; letter-spacing: 2px; color: #005520; display: block; margin-bottom: 6px; }

    .divider {
      display: flex; align-items: center; gap: 12px; margin: 16px 0 12px;
    }
    .divider-line { flex: 1; height: 1px; background: #1e1e1e; }
    .divider-text { font-size: 10px; color: #333; letter-spacing: 2px; }

    .examples { display: flex; gap: 8px; flex-wrap: wrap; }
    .example-btn {
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #555; font-size: 11px; cursor: pointer; padding: 5px 10px;
      font-family: inherit; letter-spacing: 1px; transition: all 0.15s;
    }
    .example-btn:hover { border-color: rgba(0,255,80,0.3); color: #00ff50; }

    /* Button */
    .analyze-btn {
      width: 100%; padding: 18px; background: #00ff50; border: none;
      border-radius: 10px; color: #000; font-size: 14px; font-weight: 700;
      letter-spacing: 3px; cursor: pointer; font-family: inherit;
      transition: all 0.15s; margin-bottom: 32px;
    }
    .analyze-btn:hover:not(:disabled) { background: #33ff70; }
    .analyze-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

    /* Spinner */
    .spinner-wrap { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px; border: 2px solid #1a1a1a;
      border-top: 2px solid #00ff50; border-radius: 50%;
      margin: 0 auto 16px; animation: spin 0.8s linear infinite;
    }
    .spinner-label { font-size: 12px; letter-spacing: 2px; color: #444; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.2);
      border-radius: 10px; padding: 16px; color: #ff5555; font-size: 13px;
      margin-bottom: 16px;
    }

    /* Results */
    .result { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .no-bet {
      background: #111; border: 1px solid #222; border-radius: 12px;
      padding: 32px; text-align: center;
    }
    .no-bet-emoji { font-size: 32px; margin-bottom: 12px; }
    .no-bet p { color: #555; font-size: 14px; letter-spacing: 1px; }
    .no-bet span { color: #333; }

    .sport-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .sport-emoji { font-size: 22px; }
    .sport-badge {
      background: rgba(0,255,80,0.1); border: 1px solid rgba(0,255,80,0.25);
      border-radius: 4px; padding: 3px 10px; font-size: 11px;
      letter-spacing: 2px; color: #00ff50;
    }
    .confidence { margin-left: auto; font-size: 11px; letter-spacing: 1px; }
    .conf-high { color: #00ff50; }
    .conf-medium { color: #ffaa00; }
    .conf-low { color: #ff5555; }

    .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .bet-card { border-radius: 10px; padding: 20px; }
    .bet-card.their { background: rgba(255,50,50,0.06); border: 1px solid rgba(255,50,50,0.15); }
    .bet-card.fade { background: rgba(0,255,80,0.06); border: 1px solid rgba(0,255,80,0.2); }
    .bet-card-label { font-size: 10px; letter-spacing: 2px; margin-bottom: 8px; }
    .bet-card.their .bet-card-label { color: #663333; }
    .bet-card.fade .bet-card-label { color: #005520; }
    .bet-value { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .bet-card.their .bet-value { color: #cc4444; }
    .bet-card.fade .bet-value { color: #00ff50; }

    .reasoning-box {
      background: #111; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 16px; margin-bottom: 16px; font-size: 13px; color: #666; line-height: 1.6;
    }
    .reasoning-label { color: #333; letter-spacing: 1px; font-size: 10px; }

    .copy-box {
      background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 16px; margin-bottom: 16px;
    }
    .copy-label { font-size: 10px; letter-spacing: 2px; color: #444; margin-bottom: 10px; }
    .copy-text { font-size: 14px; color: #aaa; line-height: 1.6; white-space: pre-wrap; margin-bottom: 12px; }
    .copy-btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 8px 16px; color: #666; font-size: 11px; letter-spacing: 2px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .copy-btn.copied { background: rgba(0,255,80,0.15); border-color: rgba(0,255,80,0.4); color: #00ff50; }

    .dk-link {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,255,80,0.06); border: 1px solid rgba(0,255,80,0.2);
      border-radius: 10px; padding: 16px 20px; text-decoration: none; transition: all 0.15s;
    }
    .dk-link:hover { background: rgba(0,255,80,0.1); }
    .dk-link-label { font-size: 10px; letter-spacing: 2px; color: #005520; margin-bottom: 4px; }
    .dk-link-text { font-size: 14px; font-weight: 700; color: #00ff50; }
    .dk-emoji { font-size: 24px; }


    
    
    
    .api-input:focus { border-color: rgba(0,255,80,0.4); }
    
    .api-save-btn:hover { background: rgba(0,255,80,0.2); }
    

    .footer { text-align: center; margin-top: 64px; color: #2a2a2a; font-size: 11px; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="badge">Fade Machine</div>
    <h1>FADE<span>TRENT</span></h1>
    <p class="subtitle">PASTE HIS TWEET LINK. GET THE OPPOSITE.</p>
  </div>

  <!-- Input -->
  <div class="card" id="inputCard">
    <label class="card-label" id="inputLabel">PASTE TWEET LINK OR TEXT</label>
    <input type="text" id="tweetInput" placeholder="https://x.com/BookItWithTrent/status/..." />
    <div id="tweetPreview" style="display:none" class="tweet-preview">
      <span class="tweet-preview-label">TWEET FETCHED</span>
      <span id="previewText"></span>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR TRY AN EXAMPLE</span>
      <div class="divider-line"></div>
    </div>
    <div class="examples">
      <button class="example-btn" onclick="setExample('Chiefs -6.5 tonight. Easy money, book it 🔒 #NFL')">NFL spread</button>
      <button class="example-btn" onclick="setExample('Over 228.5 in Lakers vs Celtics. Both offenses are cooking rn')">NBA total</button>
      <button class="example-btn" onclick="setExample('Yankees ML tonight. Gerrit Cole on the mound, no brainer')">MLB ML</button>
      <button class="example-btn" onclick="setExample('Oilers to win the series -180. McDavid just hits different in playoffs 🏒')">NHL series</button>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeBet()" disabled>GET THE FADE →</button>

  <div id="spinner" class="spinner-wrap" style="display:none">
    <div class="spinner"></div>
    <p class="spinner-label" id="spinnerLabel">ANALYZING BET...</p>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="result"></div>

  <div class="footer">POWERED BY CLAUDE AI · FOR ENTERTAINMENT PURPOSES</div>
</div>

<script>
const PROXY_URL = "https://fadebot-production.up.railway.app";
const SPORT_PATHS = {
  NFL: "https://sportsbook.draftkings.com/leagues/football/nfl",
  NBA: "https://sportsbook.draftkings.com/leagues/basketball/nba",
  MLB: "https://sportsbook.draftkings.com/leagues/baseball/mlb",
  NHL: "https://sportsbook.draftkings.com/leagues/hockey/nhl",
};
const SPORT_EMOJIS = { NFL: "🏈", NBA: "🏀", MLB: "⚾", NHL: "🏒" };

let fetchedTweetText = null;

function isTwitterUrl(str) {
  return /https?:\/\/(www\.)?(twitter\.com|x\.com)\/.+\/status\/\d+/i.test(str.trim());
}

function cleanTwitterUrl(str) {
  try {
    const url = new URL(str.trim());
    return url.origin + url.pathname;
  } catch(e) { return str.trim(); }
}

function setExample(text) {
  document.getElementById('tweetInput').value = text;
  fetchedTweetText = null;
  document.getElementById('tweetPreview').style.display = 'none';
  onInputChange();
}

function onInputChange() {
  const val = document.getElementById('tweetInput').value;
  const btn = document.getElementById('analyzeBtn');
  const label = document.getElementById('inputLabel');
  const card = document.getElementById('inputCard');
  const input = document.getElementById('tweetInput');

  btn.disabled = !val.trim();

  if (isTwitterUrl(val)) {
    label.textContent = '✓ TWEET URL DETECTED';
    label.className = 'card-label green';
    card.className = 'card url-detected';
    input.className = 'url';
  } else {
    label.textContent = 'PASTE TWEET LINK OR TEXT';
    label.className = 'card-label';
    card.className = 'card';
    input.className = '';
  }
}

document.getElementById('tweetInput').addEventListener('input', () => {
  fetchedTweetText = null;
  document.getElementById('tweetPreview').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('errorBox').style.display = 'none';
  onInputChange();
});

function showSpinner(label) {
  document.getElementById('spinnerLabel').textContent = label;
  document.getElementById('spinner').style.display = 'block';
}
function hideSpinner() {
  document.getElementById('spinner').style.display = 'none';
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}

async function fetchTweet(url) {
  showSpinner('FETCHING TWEET...');
  const res = await fetch(`${PROXY_URL}/oembed?url=${encodeURIComponent(cleanTwitterUrl(url))}`);
  if (!res.ok) throw new Error('Could not fetch tweet from proxy.');
  const data = await res.json();
  if (!data.text) throw new Error('Could not extract tweet text.');
  return data.text;
}

async function analyzeBet() {
  const input = document.getElementById('tweetInput').value.trim();
  if (!input) return;

  document.getElementById('result').innerHTML = '';
  hideError();
  document.getElementById('analyzeBtn').disabled = true;

  let tweetText = input;

  if (isTwitterUrl(input)) {
    try {
      tweetText = await fetchTweet(input);
      fetchedTweetText = tweetText;
      document.getElementById('previewText').textContent = `"${tweetText}"`;
      document.getElementById('tweetPreview').style.display = 'block';
    } catch(e) {
      hideSpinner();
      showError(`Couldn't fetch that tweet: ${e.message}`);
      document.getElementById('analyzeBtn').disabled = false;
      return;
    }
  }

  showSpinner('ANALYZING BET...');

  try {
    const response = await fetch(`${PROXY_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tweetText })
    });

    if (!response.ok) throw new Error("Server error analyzing bet.");
    const parsed = await response.json();
    renderResult(parsed);
  } catch(e) {
    showError('Something went wrong parsing the bet. Try again.');
  } finally {
    hideSpinner();
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderResult(r) {
  const el = document.getElementById('result');

  if (!r.is_bet) {
    el.innerHTML = `
      <div class="no-bet">
        <div class="no-bet-emoji">🤷</div>
        <p>DOESN'T LOOK LIKE A BET.<br><span>Try pasting a tweet with a spread, line, or pick.</span></p>
      </div>`;
    return;
  }

  const dkUrl = SPORT_PATHS[r.sport] || SPORT_PATHS.NFL;
  const emoji = SPORT_EMOJIS[r.sport] || '🎰';
  const confClass = r.confidence === 'high' ? 'conf-high' : r.confidence === 'medium' ? 'conf-medium' : 'conf-low';
  const betType = (r.bet_type || '').replace('_', '/').toUpperCase();

  el.innerHTML = `
    <div class="result">
      <div class="sport-row">
        <span class="sport-emoji">${emoji}</span>
        <span class="sport-badge">${r.sport || 'UNKNOWN'} · ${betType}</span>
        <span class="confidence ${confClass}">${(r.confidence || '').toUpperCase()} CONFIDENCE</span>
      </div>
      <div class="bet-grid">
        <div class="bet-card their">
          <div class="bet-card-label">TRENT'S BET</div>
          <div class="bet-value">${r.original_bet}</div>
        </div>
        <div class="bet-card fade">
          <div class="bet-card-label">THE FADE</div>
          <div class="bet-value">${r.fade_bet}</div>
        </div>
      </div>
      <div class="reasoning-box">
        <span class="reasoning-label">WHY: </span>${r.reasoning}
      </div>
      <div class="copy-box">
        <div class="copy-label">READY-TO-POST REPLY</div>
        <div class="copy-text" id="copyText">${r.copy_text}</div>
        <button class="copy-btn" id="copyBtn" onclick="copyReply()">COPY REPLY</button>
      </div>
      <a href="${dkUrl}" target="_blank" class="dk-link">
        <div>
          <div class="dk-link-label">BET THE FADE</div>
          <div class="dk-link-text">Open DraftKings ${r.sport} →</div>
        </div>
        <div class="dk-emoji">📲</div>
      </a>
    </div>`;
}

function copyReply() {
  const text = document.getElementById('copyText')?.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ COPIED';
  btn.className = 'copy-btn copied';
  setTimeout(() => { btn.textContent = 'COPY REPLY'; btn.className = 'copy-btn'; }, 2000);
}
</script>
</body>
</html>
